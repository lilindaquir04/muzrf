<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Orange rounded square background -->
  <rect width="48" height="48" rx="10" fill="#ED6B14"/>
  <!-- Double music note (beam + stems + heads) -->
  <!-- Beam connecting tops of both stems -->
  <rect x="16" y="12" width="18" height="3" rx="1.5" fill="white"/>
  <!-- Stem 1 -->
  <rect x="16" y="12" width="2.5" height="17" rx="1.25" fill="white"/>
  <!-- Stem 2 -->
  <rect x="31.5" y="12" width="2.5" height="17" rx="1.25" fill="white"/>
  <!-- Note head 1 (ellipse, slightly rotated feel via transform) -->
  <ellipse cx="18.5" cy="31" rx="5.5" ry="4" transform="rotate(-12 18.5 31)" fill="white"/>
  <!-- Note head 2 -->
  <ellipse cx="34" cy="31" rx="5.5" ry="4" transform="rotate(-12 34 31)" fill="white"/>
</svg>
